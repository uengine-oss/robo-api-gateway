# api-gateway — K8s 배포 스펙 (이 서비스 단독). 단일 진입점(Ingress 는 엄브렐러 글루).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: robo
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: gateway
          image: robo/api-gateway:latest         # 엄브렐러 kustomization 에서 레지스트리 치환
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: docker }   # application-docker.yml(컨테이너명 라우팅)
          ports: [ { containerPort: 9000 } ]
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: robo
spec:
  selector: { app: api-gateway }
  ports: [ { port: 9000, targetPort: 9000 } ]
